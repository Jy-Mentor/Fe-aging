# ============================================================================
# 铁衰老单细胞测序分析 Pipeline 配置
# 数据集: GSE233815 (MCAO 小鼠脑 snRNA-seq + scRNA-seq + 空间转录组, Zucha et al. 2024 PNAS)
# 4 条件: Ctrl(sham) / 1DPI / 3DPI / 7DPI
# 数据来源: GSE233815_RAW.tar (97 文件: 48 bulk + 12 scRNA + 12 snRNA + 25 spatial)
# ============================================================================

project:
  name: "GSE233815_MCAO_Ferroaging_scRNA"
  root: "d:/铁衰老 绝不重蹈覆辙"
  pipeline_dir: "L2/scRNA_pipeline_R"
  outputs_dir: "L2/scRNA_pipeline_R/outputs"
  log_dir: "L2/scRNA_pipeline_R/outputs/logs"
  figures_dir: "L2/scRNA_pipeline_R/outputs/figures"
  tables_dir: "L2/scRNA_pipeline_R/outputs/tables"
  rds_dir: "L2/scRNA_pipeline_R/outputs/rds"

data:
  # 主分析对象: 作者已 QC 过的 snRNA Seurat 对象 (mendeley 数据集)
  # - 包含 Celltypes 注释、Condition 元数据、UMAP 嵌入
  # - 由 Zucha et al. 2024 提供, 来源: GSE233815 supplementary
  seurat_object: "data/external/GSE233815/mendeley/Seurat_sn_MCAO_Zucha2023_QCFiltered.Rds"

  # 原始 10x 矩阵 (用于从头构建 Seurat 对象时使用, 需 emptyDrops 过滤)
  # sc: 4 样本 (sham/D1/D3/D7) × 3 文件 (barcodes/genes/matrix)
  # sn: 4 样本 (sham/D1/D3/D7) × 3 文件 (barcodes/genes/matrix)
  sc_10x_dir: "data/external/GSE233815/sc"
  sn_10x_dir: "data/external/GSE233815/sn"
  sc_samples: ["sham", "D1", "D3", "D7"]
  sn_samples: ["sham", "D1", "D3", "D7"]

  # 空间转录组 (10x Visium)
  spatial_10x_dir: "data/external/GSE233815/spatial"
  spatial_samples: ["C1-control", "B1-D1", "D1-D3", "C1-D7", "D1-D7"]

  # 已带 ferroaging 评分的 Seurat 对象 (可选, 项目既有成果)
  seurat_object_with_ferroaging: "L2/results/GSE233815_sn/Seurat_sn_MCAO_with_ferroaging_score.rds"

  # 铁衰老评分既有列 (若 seurat_object 已含则复用, 避免重复计算)
  ferroaging_col_ucell: "FA_96_UCell"
  ferroaging_col_addmodule: "AddModuleScore_FA96"

  # Bulk RNA-seq (48 samples, 用于 Scissor 整合)
  bulk_count_dir: "data/external/GSE233815/bulk"
  bulk_sample_metadata: "data/external/GSE233815/bulk/sample_metadata.csv"
  bulk_expr_matrix: "L1/results/GSE233815_bulk_expression_matrix.csv"
  bulk_pheno_scores: "L2/results/ferroaging_ssgsea_scores_GSE233815_bulk.csv"

  # 铁衰老基因集与核心基因
  ferroaging_genes: "铁衰老基因.txt"
  core_genes: "L2/results/final_core_gene_set.csv"

analysis:
  random_seed: 42
  species: "mouse"
  condition_col: "Condition"
  condition_levels: ["Ctrl", "1DPI", "3DPI", "7DPI"]
  celltype_col: "Celltypes"
  celltype_detail_col: "CelltypesDetailed"
  sample_col: "Sample"

qc:
  # 数据已由 Zucha et al. 2024 QC 过滤; Pipeline 仅做二次验证
  min_nFeature_RNA: 200
  max_nFeature_RNA: 6000
  max_percent_mt: 20
  min_cells_per_gene: 20
  data_already_filtered: true

clustering:
  pca_dims: 30
  resolution: 0.8
  use_existing: true

de:
  method: "wilcox"
  logfc_threshold: 0.58
  adj_pval_threshold: 0.05
  min_pct: 0.1
  test_use: "wilcox"

cellchat:
  nboot: 100
  population_size: 100
  min_cells_per_type: 10
  ligand_receptor_db: "Secretome DB"
  compute_pathways: ["GALECTIN", "MIF", "CCL", "CXCL", "TNF", "IL1", "IL6",
                     "TGFb", "BMP", "WNT", "NOTCH", "EGF", "FGF", "VEGI",
                     "PDGF", "CSF", "SPP1", "ANNEXIN", "MHC-I", "MHC-II",
                     "CD40", "VISFATIN", "COMPLEMENT", "FASLG", "TRAIL",
                     "BTLA", "BAG", "GRN", "GAS", "nAChR", "PROS", "GDF",
                     "ncWNT", "LAMININ", "COLLAGEN", "FN1", "TENASCIN",
                     "AGRN", "NCAM", "NEUREXIN", "Ephrin", "EPH", "SEMA4",
                     "SEMA5", "SEMA6", "SEMA3", "SLIT", "ROBO", "TENASCIN",
                     "THBS", "L1CAM", "JAM", "CDH", "NCAM1", "SELE", "SELL",
                     "CD99", "ADGRE5", "CEACAM", "SELPLG", "MADCAM1", "VCAM",
                     "ICAM", "PECAM1", "CDH5", "ESAM", "PECAM", "TIE",
                     "ANGPT", "DLL", "JAGGED", "SEMaphorIN", "CNTN", "MBP",
                     "MAG", "MOG", "OPC", "OLIG"]

enrichment:
  pvalue_cutoff: 0.05
  qvalue_cutoff: 0.2
  organism: "mmu"
  keyType: "SYMBOL"
  go_ontologies: ["BP", "MF", "CC"]
  kegg_organism: "mmu"

trajectory:
  method: "monocle3"
  cell_types_to_trajectory: ["Microglia", "OLs", "OPCs", "Astrocytes"]

scissor:
  alpha: [0.05, 0.2]
  cutoff_fraction: 0.2
  n_bootstrap: 100
  lambda: "Nlambda"

report:
  figure_dpi: 300
  figure_format: "png"
  figure_width: 10
  figure_height: 8
