# 超参数搜索配置 (v1)
# 定义 Optuna 贝叶斯优化搜索空间、预算和约束

# 搜索预算
budget:
  # 总试验次数
  n_trials: 50
  # 每个试验的训练 epoch 数（减少以节省时间）
  n_epochs: 30
  # 早停 patience（epoch）
  early_stopping_patience: 5
  # 早停指标
  early_stopping_metric: "aupr"
  # 验证频率（每 N 个 epoch）
  val_freq: 1
  # 超时限制（秒，0 表示无限制）
  timeout: 0
  # 并行试验数（-1 表示自动）
  n_jobs: 1

# 搜索空间
search_space:
  # 学习率
  lr:
    type: "log_uniform"
    low: 1.0e-4
    high: 1.0e-2
  # 权重衰减
  weight_decay:
    type: "log_uniform"
    low: 1.0e-6
    high: 1.0e-3
  # Dropout 比率
  dropout:
    type: "uniform"
    low: 0.1
    high: 0.5
  # 隐藏维度
  hidden_dim:
    type: "categorical"
    choices: [64, 128, 256]
  # 输出维度
  out_dim:
    type: "categorical"
    choices: [64, 128, 256]
  # GNN 层数
  num_layers:
    type: "int"
    low: 1
    high: 3
  # 双线性解码器秩
  decoder_rank:
    type: "categorical"
    choices: [32, 64, 128]
  # 温度参数
  temperature:
    type: "uniform"
    low: 0.5
    high: 2.0
  # 采样邻居数（第一层）
  num_neighbors_0:
    type: "categorical"
    choices: [16, 32, 64]
  # 采样邻居数（第二层）
  num_neighbors_1:
    type: "categorical"
    choices: [8, 16, 32]
  # 批大小
  batch_size:
    type: "categorical"
    choices: [64, 128, 256]
  # 损失函数焦点 gamma
  focal_gamma:
    type: "uniform"
    low: 0.0
    high: 3.0
  # 损失函数焦点 alpha
  focal_alpha:
    type: "uniform"
    low: 0.5
    high: 0.99
  # 正样本标签平滑
  label_smoothing_pos:
    type: "uniform"
    low: 0.9
    high: 0.99

# 优化目标
optimization:
  # 优化方向: "maximize" | "minimize"
  direction: "maximize"
  # 主指标
  metric: "val/aupr"
  # 修剪器: "median" | "hyperband" | "none"
  pruner: "median"
  # 修剪器启动步数
  pruner_startup_trials: 5
  # 修剪器预热步数
  pruner_warmup_steps: 3

# MLflow 追踪
mlflow:
  # 是否启用 MLflow 追踪
  enabled: true
  # 实验名称
  experiment_name: "iron_aging_gnn_hyperparameter_search"
  # 追踪 URI（默认本地）
  tracking_uri: ""
  # 工件存储位置
  artifact_location: ""

# 模型选择
model:
  # 模型类型: "sage" | "hgt" | "simplehgn" | "rgcn"
  type: "sage"
  # 解码器类型: "mlp" | "dot" | "bilinear" | "residue_bilinear"
  decoder_type: "residue_bilinear"