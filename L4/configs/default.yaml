# v67 论文驱动全面优化 (2026-07-12)
# 基于7篇论文 (DHGT-DTI, GHCDTI, H2GnnDTI, MHGNN-DTI, HTINet2, GENNDTI, MDL-HTI)
# 核心优化:
#   - 重新启用 InfoNCE 对比学习 (GHCDTI: 跨视图对比学习提升泛化)
#   - 增强辅助网络重建为全6类网络 (DHGT-DTI: 重建所有网络提升预测)
#   - 添加冷启动评估 (GHCDTI: Cold Drug/Cold Target)
#   - 添加元路径图构建模块 (DHGT-DTI/MHGNN-DTI: 高阶语义学习)
#   - 添加 Graph Transformer 编码器 (DHGT-DTI: 全局视角元路径学习)
#   - 添加语义注意力机制 (GHCDTI: 跨模态对齐)
random_seed: 42
model:
  hidden_dim: 128
  out_dim: 128
  num_layers: 3
  dropout: 0.3
  num_heads: 2
  prot_proj_dropout: 0.2
  prot_proj_inner_dropout: 0.2
  pathway_proj_dropout: 0.2
  pheno_head_dropout: 0.25
  score_clamp: 10.0
  temperature: 1.0
  decoder_type: "residue_bilinear"
sage:
  hidden_dim: 64
  out_dim: 64
  num_layers: 2
  epochs: 30
  lr: 0.0005
  patience: 10
  batch_size: 128
  num_neighbors:
  - 16
  - 8
  two_stage: true
  pretrain_epochs: 15
  pretrain_lr: 0.00075
  finetune_lr_multiplier: 0.5
  use_plateau_scheduler: true
  plateau_patience: 3
  plateau_factor: 0.5
hgt:
  epochs: 20
  lr: 0.0005
  patience: 7
  batch_size: 64
  num_neighbors:
  - 16
  - 8
  two_stage: true
  pretrain_epochs: 10
  pretrain_lr: 0.00075
  finetune_lr_multiplier: 0.5
  use_plateau_scheduler: true
  plateau_patience: 3
  plateau_factor: 0.5
simplehgn:
  epochs: 20
  lr: 0.001
  patience: 7
  batch_size: 128
  num_neighbors:
  - 32
  - 16
  val_num_neighbors:
  - 8
  - 4
  val_batch_size: 256
  two_stage: true
  pretrain_epochs: 10
  pretrain_lr: 0.0015
  use_plateau_scheduler: true
  plateau_patience: 3
  plateau_factor: 0.5
  finetune_lr_multiplier: 0.5
two_stage:
  head_ratio: 0.2
  lambda_hhi: 1.0
  head_undersample_ratio: 0.6
  infonce_warmup_ratio: 0.15
  pretrain_lr_multiplier: 1.5
  pretrain_lr_decay: 0.5
curriculum:
  random_ratio: 0.4
  moderate_ratio: 0.4
  hard_ratio: 0.2
  moderate_pathway_weight: 0.3
  medium_neg_ratio: 0.25
  hard_neg_ratio: 0.15
negative_sampling:
  use_topology_neg: true
  use_esm_similarity_neg: true
  topo_neighbors_top_k: 50
  esm_similarity_top_k: 50
loss:
  focal_gamma: 2.0
  focal_alpha: 0.75
  label_smoothing_pos: 0.9
  label_smoothing_neg: 0.1
  bpr_weight: 0.3
  bce_weight: 1.0
  infonce_weight: 0.1
  infonce_temperature: 0.07
  aux_recon_weight: 0.15
  aux_recon_ppi_samples: 256
  aux_recon_pathway_samples: 128
  aux_recon_ddi_samples: 128
  aux_recon_drug_disease_samples: 128
  aux_recon_protein_disease_samples: 128
  aux_recon_drug_side_effect_samples: 128
  semantic_attn_weight: 0.05
  semantic_attn_temperature: 0.5
training:
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  warmup_ratio: 0.10
  pheno_lambda: 0.05
  dropedge_ppi: 0.05
  dropedge_pathway: 0.05
validation:
  compound_split_ratio: 0.85
  protein_cold_split_ratio: 0.50
  mc_samples: 30
  diversity_penalty: 0.3
  hard_neg_top_k: 5
  rand_neg_top_k: 5
  prot_cold_neg_ratio: 10
  val_batch_size: 512
  hgt_val_batch_size: 256
  hgt_val_num_neighbors:
  - 8
  - 4
  hgt_val_use_residue_for_pos: false
  val_freq: 3
  pretrain_val_freq: 5
  mem_refresh_freq: 3
  default_aupr: 0.5
  enable_cold_drug_eval: false
  enable_cold_target_eval: false
  cold_drug_split_ratio: 0.2
  cold_target_split_ratio: 0.2
prediction:
  tree_ensemble_weight: 0.6
memory_bank:
  memory_bank_size: 4096
  infonce_mem_sample: 128
esm2:
  esm_max_len: 256
  residue_device: "cpu"
decoder:
  max_residue_batch: 2
  init_scheme: "orthogonal"
  final_bias_init: -0.5
meta_path:
  enabled: false
  drug_meta_paths:
    - ["drug", "protein", "drug"]
    - ["drug", "protein", "protein", "drug"]
  protein_meta_paths:
    - ["protein", "protein"]
    - ["protein", "drug", "protein"]
  max_path_length: 4
graph_transformer:
  enabled: false
  num_layers: 2
  num_heads: 4
  dropout: 0.3
  use_gated_residual: true
  output_dim: 128
