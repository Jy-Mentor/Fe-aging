# v44 8GB显存安全配置 (2026-07-06)
# 目标: 化合物冷启动发现 + residue_bilinear + 拓扑/ESM难负样本
# 策略: 降配 hidden_dim=64 + 小batch + 低max_len + CPU残基驻留
random_seed: 42
model:
  hidden_dim: 64
  out_dim: 64
  num_layers: 2
  dropout: 0.4
  num_heads: 2
  prot_proj_dropout: 0.3
  prot_proj_inner_dropout: 0.25
  pathway_proj_dropout: 0.25
  pheno_head_dropout: 0.3
  score_clamp: 10.0
  decoder_type: "residue_bilinear"
sage:
  epochs: 20
  lr: 0.0005
  patience: 5
  batch_size: 128
  num_neighbors:
  - 16
  - 8
  two_stage: true
  pretrain_epochs: 10
  pretrain_lr: 0.00075
hgt:
  epochs: 20
  lr: 0.0008
  patience: 5
  batch_size: 32
  num_neighbors:
  - 16
  - 8
  two_stage: true
  pretrain_epochs: 10
  pretrain_lr: 0.0012
two_stage:
  head_ratio: 0.2
  lambda_hhi: 1.0
  head_undersample_ratio: 0.6
  infonce_warmup_ratio: 0.15
  pretrain_lr_multiplier: 1.5
  pretrain_lr_decay: 0.5
curriculum:
  random_ratio: 0.3
  moderate_ratio: 0.4
  hard_ratio: 0.3
  moderate_pathway_weight: 0.3
  medium_neg_ratio: 0.3
  hard_neg_ratio: 0.2
negative_sampling:
  use_topology_neg: true
  use_esm_similarity_neg: true
  topo_neighbors_top_k: 50
  esm_similarity_top_k: 50
loss:
  focal_gamma: 2.5
  focal_alpha: 0.85
  label_smoothing_pos: 0.9
  label_smoothing_neg: 0.1
  bpr_weight: 0.65
  bce_weight: 0.35
  infonce_weight: 0.1
  infonce_temperature: 0.07
training:
  weight_decay: 0.00005
  grad_clip_norm: 1.0
  warmup_ratio: 0.15
  pheno_lambda: 0.05
  dropedge_ppi: 0.15
  dropedge_pathway: 0.1
  flag_step: 0.01
validation:
  val_freq: 5
  pretrain_val_freq: 10
  mem_refresh_freq: 5
prediction:
  tree_ensemble_weight: 0.6
memory_bank:
  memory_bank_size: 4096
  infonce_mem_sample: 128
esm2:
  esm_max_len: 256
  residue_device: "cpu"
decoder:
  max_residue_batch: 4