# v57 全面修复配置 (2026-07-08)
# 目标: TCM隔离 + 课程累积调度 + BPR增强 + HGT容量提升 + 冷启动修复
# 策略:
#   - HGT hidden_dim 64→128, num_layers 2→3，提升模型容量
#   - 课程负采样改用累积epoch，避免微调阶段重置回随机采样
#   - BPR 负样本改用 hard_neg_scores，增强排序学习
#   - 温度参数 T=2.0，Focal gamma=2.0
random_seed: 42
model:
  hidden_dim: 128
  out_dim: 128
  num_layers: 3
  dropout: 0.3
  num_heads: 2
  prot_proj_dropout: 0.2
  prot_proj_inner_dropout: 0.2
  pathway_proj_dropout: 0.2
  pheno_head_dropout: 0.25
  score_clamp: 10.0
  temperature: 1.0
  decoder_type: "residue_bilinear"
sage:
  # v60-fix: SAGE 保持轻量配置，避免容量翻倍导致收敛困难；HGT 单独使用 model 级 128/3 配置。
  hidden_dim: 64
  out_dim: 64
  num_layers: 2
  epochs: 25
  lr: 0.0005
  patience: 7
  batch_size: 128
  num_neighbors:
  - 16
  - 8
  two_stage: true
  pretrain_epochs: 15
  pretrain_lr: 0.00075
  finetune_lr_multiplier: 0.5
  use_plateau_scheduler: true
  plateau_patience: 1
  plateau_factor: 0.5
hgt:
  epochs: 20
  lr: 0.0005
  patience: 7
  batch_size: 64
  num_neighbors:
  - 16
  - 8
  two_stage: true
  pretrain_epochs: 10
  pretrain_lr: 0.00075
  finetune_lr_multiplier: 0.5
  use_plateau_scheduler: true
  plateau_patience: 2
  plateau_factor: 0.5
simplehgn:
  epochs: 20
  lr: 0.001
  patience: 7
  batch_size: 128
  num_neighbors:
  - 32
  - 16
  val_num_neighbors:
  - 8
  - 4
  val_batch_size: 256
  two_stage: true
  pretrain_epochs: 10
  pretrain_lr: 0.0015
two_stage:
  head_ratio: 0.2
  lambda_hhi: 1.0
  head_undersample_ratio: 0.6
  infonce_warmup_ratio: 0.15
  pretrain_lr_multiplier: 1.5
  pretrain_lr_decay: 0.5
curriculum:
  random_ratio: 0.4
  moderate_ratio: 0.4
  hard_ratio: 0.2
  moderate_pathway_weight: 0.3
  medium_neg_ratio: 0.25
  hard_neg_ratio: 0.15
negative_sampling:
  use_topology_neg: true
  use_esm_similarity_neg: true
  topo_neighbors_top_k: 50
  esm_similarity_top_k: 50
loss:
  # focal_gamma=2.0: 标准值，压制"易分错误样本"的梯度
  focal_gamma: 2.0
  focal_alpha: 0.75
  label_smoothing_pos: 0.9
  label_smoothing_neg: 0.1
  # v57: BPR增强 — 使用hard_neg_scores替代随机采样，增强排序学习
  # v60-diag: 临时关闭 BPR 以诊断训练崩溃原因
  bpr_weight: 0.0
  bce_weight: 1.0
  infonce_weight: 0.0
  infonce_temperature: 0.07
training:
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  warmup_ratio: 0.10
  pheno_lambda: 0.05
  dropedge_ppi: 0.05
  dropedge_pathway: 0.05
validation:
  compound_split_ratio: 0.85
  protein_cold_split_ratio: 0.50
  mc_samples: 30
  diversity_penalty: 0.3
  hard_neg_top_k: 5
  rand_neg_top_k: 5
  prot_cold_neg_ratio: 10
  val_batch_size: 512
  hgt_val_batch_size: 256
  hgt_val_num_neighbors:
  - 8
  - 4
  # v61-fix: HGT 验证是否对正样本使用残基注意力分数。关闭时统一使用 fast bilinear 打分，
  # 避免正样本残基分数与负样本 fast bilinear 分数分布不一致导致 AUC/AUPR 虚高为 1.0。
  hgt_val_use_residue_for_pos: false
  val_freq: 3
  pretrain_val_freq: 5
  mem_refresh_freq: 3
  default_aupr: 0.5
prediction:
  tree_ensemble_weight: 0.6
memory_bank:
  memory_bank_size: 4096
  infonce_mem_sample: 128
esm2:
  esm_max_len: 256
  residue_device: "cpu"
decoder:
  max_residue_batch: 2
  init_scheme: "orthogonal"
  final_bias_init: -0.5