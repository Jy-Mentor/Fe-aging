# v49 准确率修复优化配置 (2026-07-06)
# 目标: 修复 residue_bilinear 残基索引映射错误、decoder初始化被覆盖、训练/验证指标计算偏差
# 策略:
#   - 修复训练/验证中 prot_residue_indices 传入局部索引而非全局索引的 bug
#   - HGT 化合物冷启动验证邻接表仅移除 val_comp->val_prot 的 CPI 边，保留到训练蛋白的边
#   - 禁止 trainer.py 无条件覆盖 decoder 精心设计的初始化，保留 score_mlp 末层小增益
#   - 温度参数 T=5.0→2.0，在缓解概率过度压缩的同时避免 T=1.0 时的验证指标恶化
#   - Focal gamma=2.0 标准值，BPR 继续关闭以验证修复效果
random_seed: 42
model:
  hidden_dim: 64
  out_dim: 64
  num_layers: 2
  dropout: 0.3
  num_heads: 2
  prot_proj_dropout: 0.2
  prot_proj_inner_dropout: 0.2
  pathway_proj_dropout: 0.2
  pheno_head_dropout: 0.25
  score_clamp: 10.0
  temperature: 2.0
  decoder_type: "residue_bilinear"
sage:
  epochs: 25
  lr: 0.0005
  patience: 7
  batch_size: 128
  num_neighbors:
  - 16
  - 8
  two_stage: true
  pretrain_epochs: 15
  pretrain_lr: 0.00075
hgt:
  epochs: 20
  lr: 0.0005
  patience: 7
  batch_size: 64
  num_neighbors:
  - 3
  - 2
  two_stage: true
  pretrain_epochs: 10
  pretrain_lr: 0.00075
two_stage:
  head_ratio: 0.2
  lambda_hhi: 1.0
  head_undersample_ratio: 0.6
  infonce_warmup_ratio: 0.15
  pretrain_lr_multiplier: 1.5
  pretrain_lr_decay: 0.5
curriculum:
  random_ratio: 0.4
  moderate_ratio: 0.4
  hard_ratio: 0.2
  moderate_pathway_weight: 0.3
  medium_neg_ratio: 0.25
  hard_neg_ratio: 0.15
negative_sampling:
  use_topology_neg: true
  use_esm_similarity_neg: true
  topo_neighbors_top_k: 50
  esm_similarity_top_k: 50
loss:
  # focal_gamma=2.0: 标准值，压制"易分错误样本"的梯度
  focal_gamma: 2.0
  focal_alpha: 0.75
  label_smoothing_pos: 0.9
  label_smoothing_neg: 0.1
  # 先关闭BPR验证纯focal loss能否收敛
  bpr_weight: 0.0
  bce_weight: 1.0
  infonce_weight: 0.0
  infonce_temperature: 0.07
training:
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  warmup_ratio: 0.10
  pheno_lambda: 0.05
  dropedge_ppi: 0.05
  dropedge_pathway: 0.05
  # 关闭flag_step，确保预训练阶段输入稳定
  flag_step: 0.0
validation:
  val_freq: 3
  pretrain_val_freq: 5
  mem_refresh_freq: 3
prediction:
  tree_ensemble_weight: 0.6
memory_bank:
  memory_bank_size: 4096
  infonce_mem_sample: 128
esm2:
  esm_max_len: 256
  residue_device: "cpu"
decoder:
  max_residue_batch: 2
  init_scheme: "orthogonal"
  final_bias_init: -0.5