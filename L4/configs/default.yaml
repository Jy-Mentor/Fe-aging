# v70 HGT架构优化 (2026-07-14)
# 基于文献系统性检索 + 本地架构审查
# 核心优化:
#   - HGT: 残差连接 + LayerNorm + ReLU 替换门控机制 (SimpleHGN 对齐)
#     参考: Chen et al. (2025) "Residual Connections Provably Mitigate Oversmoothing", arXiv:2501.00762
#   - HGT: 启用辅助网络重建正则化 (AUX_RECON_WEIGHT 0→0.05)
#     参考: Wang et al. (2025) "DHGT-DTI: Dual-View Heterogeneous Network", J. Pharm. Anal.
#     修复: compute_auxiliary_reconstruction_loss 空实现 → 基于真实邻接矩阵的 PPI/通路/DDI 边重建
#   - HGT: 预训练 LR 降低至 0.0003 (防止发散)
#   - 保留两阶段迁移学习 + 课程负采样 + Hard-BPR + 固定 1:100 验证
#   - 日志文件名从 v60 修正为 v70
#   - 版本号从 v67 统一为 v70
random_seed: 42
compound_feature:
  use_3d_conformer: true

model:
  hidden_dim: 128
  out_dim: 128
  num_layers: 3
  dropout: 0.3
  num_heads: 2
  prot_proj_dropout: 0.2
  prot_proj_inner_dropout: 0.2
  pathway_proj_dropout: 0.2
  pheno_head_dropout: 0.25
  score_clamp: 10.0
  temperature: 1.0
  decoder_type: "mlp"
  use_cross_modal_fusion: false
  fusion_hidden_dim: 64
sage:
  # 硬约束: SAGE独立配置 hidden_dim:64, out_dim:64, num_layers:2
  hidden_dim: 64
  out_dim: 64
  num_layers: 2
  epochs: 80
  lr: 0.0005
  patience: 15
  batch_size: 128
  num_neighbors:
  - 32
  - 16
  - 8
  two_stage: true
  pretrain_epochs: 40
  pretrain_lr: 0.00075
  finetune_lr_multiplier: 0.5
  use_plateau_scheduler: true
  plateau_patience: 5
  plateau_factor: 0.5
hgt:
  # P0-Fix1: 增加训练 epoch (20→80) + 预训练 (10→40)
  epochs: 80
  lr: 0.001
  patience: 15
  batch_size: 128
  num_neighbors:
  - 16
  - 8
  two_stage: true
  pretrain_epochs: 40
  pretrain_lr: 0.0003
  finetune_lr_multiplier: 0.5
  use_plateau_scheduler: true
  plateau_patience: 5
  plateau_factor: 0.5
simplehgn:
  # P0-Fix1: 增加训练 epoch (20→80) + 预训练 (10→40)
  epochs: 80
  lr: 0.001
  patience: 15
  batch_size: 128
  num_neighbors:
  - 32
  - 16
  val_num_neighbors:
  - 8
  - 4
  val_batch_size: 256
  two_stage: true
  pretrain_epochs: 40
  pretrain_lr: 0.001
  use_plateau_scheduler: true
  plateau_patience: 5
  plateau_factor: 0.5
  finetune_lr_multiplier: 0.5
two_stage:
  head_ratio: 0.2
  lambda_hhi: 1.0
  head_undersample_ratio: 0.6
  # Fix 2 (补充): 降低 InfoNCE 预热比例，让对比学习更早参与训练
  # 原 0.15 → 0.08: 在 GHCDTI 中对比学习从训练开始就起作用
  infonce_warmup_ratio: 0.08
  pretrain_lr_multiplier: 1.5
  pretrain_lr_decay: 0.5
curriculum:
  # P1-Fix6: 调整课程学习参数
  # - 保持 random_ratio: 0.4 (多给基础阶段时间适应新 epoch 数)
  random_ratio: 0.4
  # - moderate_ratio: 0.35 (60 epoch 中度负采样)
  moderate_ratio: 0.35
  hard_ratio: 0.25
  # - moderate_pathway_weight: 0.5 — 增强通路邻近负样本占比
  moderate_pathway_weight: 0.5
  # - medium_neg_ratio: 0.5 — 更多化合物参与中度负采样
  medium_neg_ratio: 0.5
  # - hard_neg_ratio: 0.25 — 极硬负采样比例
  hard_neg_ratio: 0.25
negative_sampling:
  use_topology_neg: true
  use_esm_similarity_neg: true
  topo_neighbors_top_k: 50
  esm_similarity_top_k: 50
loss:
  # 硬约束: BCE:0.6, BPR:0.4, InfoNCE:0, Aux:0
  focal_gamma: 1.0
  focal_alpha: 0.6
  label_smoothing_pos: 0.95
  label_smoothing_neg: 0.05
  bpr_weight: 0.4
  bce_weight: 0.6
  infonce_weight: 0.0
  infonce_temperature: 0.07
  aux_recon_weight: 0.05
  aux_recon_ppi_samples: 256
  aux_recon_pathway_samples: 128
  aux_recon_ddi_samples: 128
  aux_recon_drug_disease_samples: 128
  aux_recon_protein_disease_samples: 128
  aux_recon_drug_side_effect_samples: 128
  # Fix 5: 语义注意力权重设为 0（未集成到训练管线）
  semantic_attn_weight: 0.0
  semantic_attn_temperature: 0.5
training:
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  warmup_ratio: 0.10
  pheno_lambda: 0.05
  dropedge_ppi: 0.05
  dropedge_pathway: 0.05
validation:
  compound_split_ratio: 0.85
  protein_cold_split_ratio: 0.50
  mc_samples: 30
  diversity_penalty: 0.3
  hard_neg_top_k: 5
  rand_neg_top_k: 20
  prot_cold_neg_ratio: 50
  val_batch_size: 512
  hgt_val_batch_size: 256
  hgt_val_num_neighbors:
  - 8
  - 4
  # Fix 4: HGT 验证启用残基解码器 — 训练用残基路径但验证用 fast bilinear
  # 导致正样本验证分数与训练不一致，掩盖残基解码器真实效果
  hgt_val_use_residue_for_pos: true
  val_freq: 3
  pretrain_val_freq: 5
  mem_refresh_freq: 3
  default_aupr: 0.5
  # Fix 1: 启用冷启动评估 — GHCDTI 论文: 冷启动是真实 DTI 场景的严格评估
  # Cold Drug AUC 0.920, Cold Target AUC 0.881, 必须启用才能优化泛化能力
  enable_cold_drug_eval: true
  enable_cold_target_eval: true
  cold_drug_split_ratio: 0.2
  cold_target_split_ratio: 0.2
prediction:
  tree_ensemble_weight: 0.6
memory_bank:
  memory_bank_size: 4096
  infonce_mem_sample: 128
esm2:
  esm_max_len: 256
  residue_device: "cpu"
decoder:
  max_residue_batch: 2
  init_scheme: "orthogonal"
  final_bias_init: -0.5
ensemble:
  gated_fusion: false
  fusion_hidden_dim: 64
  fusion_temperature: 0.5
meta_path:
  enabled: false
  drug_meta_paths:
    - ["drug", "protein", "drug"]
    - ["drug", "protein", "protein", "drug"]
  protein_meta_paths:
    - ["protein", "protein"]
    - ["protein", "drug", "protein"]
  max_path_length: 4
graph_transformer:
  enabled: false
  num_layers: 2
  num_heads: 4
  dropout: 0.3
  use_gated_residual: true
  output_dim: 128
